<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Challan Status{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

  <nav class="app-navbar navbar navbar-dark position-relative">
    <div class="beacon-bar"><span></span><span></span><span></span><span></span></div>
    <div class="container justify-content-center">
      <span class="navbar-brand mb-0">
        <span class="brand-mark"></span>
        <span>
          Traffic Violation Logger
          <span class="brand-sub">Public Challan Status</span>
        </span>
      </span>
    </div>
  </nav>
  <div class="road-divider"></div>

  <div class="container py-5">
    {% block content %}{% endblock %}
  </div>

  <div class="hazard-tape"></div>
  <footer class="app-footer py-3 text-center">
    <div class="container">
      Scan verified &middot; This is an official public status page
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
